<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Economy vs Player Migration · Mundial 2026</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f5f2ec; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 24px 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.card { background: rgba(255,255,255,.82); border-radius: 14px; border: 1px solid #e8e4de; padding: 28px 28px 20px; width: 100%; max-width: 940px; }
h1 { font-size: 17px; font-weight: 600; color: #1a1a18; margin-bottom: 3px; }
.subtitle { font-size: 11px; color: #aaa; margin-bottom: 18px; }
.subtitle>span {display: block;}
.controls { display: flex; align-items: center; gap: 16px; margin-bottom: 14px; font-size: 12px; color: #555; flex-wrap: wrap; }
.control-group { display: flex; align-items: center; gap: 6px; }
input[type=range] { width: 110px; accent-color: #3b82f6; }
.badge { font-size: 13px; font-weight: 700; padding: 3px 10px; border-radius: 6px; }
.badge-rho  { color: #3b82f6; background: #eff6ff; }
.badge-n    { color: #aaa;    background: #f5f2ec; font-weight: 400; }
.axis text { font-size: 10px; fill: #aaa; }
.axis line, .axis path { stroke: #e8e4de; }
.axis-label { font-size: 11px; fill: #888; }
.regression { stroke: #3b82f6; stroke-width: 1.5; stroke-dasharray: 5 4; opacity: .55; }
.zero-line  { stroke: #e8e4de; stroke-width: 1; }
.dot { transition: r .15s, opacity .15s; cursor: default; }
.dot.dimmed { opacity: .12; }
.dot-label { font-size: 9px; fill: #666; pointer-events: none; }
.tooltip { position: fixed; background: #fff; border: 1px solid #e8e4de; border-radius: 8px; padding: 8px 12px; font-size: 12px; pointer-events: none; display: none; box-shadow: 0 2px 10px rgba(0,0,0,.08); line-height: 1.5; }
.toggle-groups { display: flex; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
.toggle-group { display: flex; flex-direction: column; gap: 5px; }
.seg { border: 1px solid #e8e4de; border-radius: 7px; background: #f5f2ec; padding: 5px 12px; cursor: pointer; color: #666; font-size: 11px; transition: background .15s, color .15s, border-color .15s; white-space: nowrap; }
.seg:hover:not(.active) { background: rgba(59,130,246,.08); }
.seg.active { background: #3b82f6; color: #fff; font-weight: 600; border-color: #3b82f6; }
.best-btn { border: 1px solid #e8e4de; border-radius: 6px; background: #fff; padding: 4px 11px; cursor: pointer; font-size: 11px; color: #555; transition: background .15s, border-color .15s, color .15s; white-space: nowrap; }
.best-btn:hover { background: #eff6ff; border-color: #3b82f6; color: #3b82f6; }
.best-btn.active { background: #eff6ff; border-color: #3b82f6; color: #3b82f6; font-weight: 600; }
.x-toggle-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.toggle-label { font-size: 11px; color: #888; white-space: nowrap; }
#x-toggle { display: flex; gap: 6px; }
</style>
</head>
<body>
<div class="card">
  <h1 id="chart-title">Elo Rank vs Player Migration · Mundial 2026</h1>
  <p class="subtitle">
    Each dot = a 2026 World Cup qualified country
    <span id="sub-x"></span>
    <span id="sub-y"></span>
  </p>
  <div class="x-toggle-row">
    <!--span class="toggle-label">X axis:</span-->
    <div id="x-toggle">
      <button class="seg active" data-xmode="rank">Elo rank</button>
      <button class="seg" data-xmode="gdp">GDP total</button>
      <button class="seg" data-xmode="gdp_pc">GDP/cap PPP</button>
      <button class="seg" data-xmode="hdi">HDI</button>
    </div>
  </div>
  <div class="toggle-groups" id="y-toggle">
    <div class="toggle-group">
      <button class="seg active" data-mode="net">exported − imported</button>
      <button class="best-btn" id="best-net" data-mode="net">…</button>
    </div>
    <div class="toggle-group">
      <button class="seg" data-mode="exports">exported only</button>
      <button class="best-btn" id="best-exports" data-mode="exports">…</button>
    </div>
    <div class="toggle-group">
      <button class="seg" data-mode="imports">imported only</button>
      <button class="best-btn" id="best-imports" data-mode="imports">…</button>
    </div>
  </div>
  <div class="controls">
    <div class="control-group">
      <label>Min. exports ≥ <strong id="exp-val">0</strong></label>
      <input type="range" id="exp-thresh" min="0" max="10" value="0">
    </div>
    <div class="control-group">
      <label>Min. imports ≥ <strong id="imp-val">0</strong></label>
      <input type="range" id="imp-thresh" min="0" max="10" value="0">
    </div>
    <span class="badge badge-rho" id="corr-label">ρ = …</span>
    <span class="badge badge-n"   id="n-label"></span>
  </div>
  <svg id="chart"></svg>
</div>
<div class="tooltip" id="tip"></div>

<script type="module">
import * as d3 from 'https://cdn.jsdelivr.net/npm/d3@7.8.5/+esm';

const [raw, eloData, gdpData, gdpPcData, hdiData] = await Promise.all([
  fetch('../data/wc2026_map_data.json').then(r => r.json()),
  fetch('../data/wc2026_elo_rank.json').then(r => r.json()),
  fetch('../extras/wc2026_gdp.json').then(r => r.json()),
  fetch('../extras/wc2026_gdp_pc_ppp.json').then(r => r.json()),
  fetch('../extras/wc2026_hdi.json').then(r => r.json()),
]);

/* ── Build dataset ─────────────────────────────────────────────────── */
const exportMap = {}, importMap = {};
raw.data.forEach(d => {
  exportMap[d.country] = d.count;
  (d.nations || []).forEach(([nat, cnt]) => { importMap[nat] = (importMap[nat] || 0) + cnt; });
});

// raw.pop is now keyed by lowercase alpha2 ('fr': 68.3, not 'France': 68.3).
// Use elo rankings (which carry iso2) to bridge id → alpha2 → population.
const idToRank = new Map(eloData.rankings.map(({id, rank}) => [id, rank]));
const idToIso2 = new Map(eloData.rankings.map(({id, iso2}) => [id, iso2?.toLowerCase()]));
const nameToId = new Map(raw.data.map(d => [d.country, d.id]));

const getPop = name => {
  const id  = nameToId.get(name);
  const iso2 = id != null ? idToIso2.get(id) : null;
  return iso2 ? (raw.pop[iso2] ?? null) : null;
};

// Enumerate countries from raw.data (has canonical names + numeric ids).
const eloRank = {};
for (const d of raw.data) {
  const r = idToRank.get(d.id);
  if (r != null) eloRank[d.country] = r;
}

const countries = Object.entries(eloRank)
  .map(([name, rank]) => ({
    name,
    rank,
    gdp:   gdpData[name]   ?? null,
    gdpPc: gdpPcData[name] ?? null,
    hdi:   hdiData[name]   ?? null,
    exports: exportMap[name] || 0,
    imports: importMap[name] || 0,
    net:    (exportMap[name] || 0) - (importMap[name] || 0),
    pop:    getPop(name),
  }));

/* ── X / Y modes ───────────────────────────────────────────────────── */
let xMode = 'rank', yMode = 'net';

const getX = d => {
  if (xMode === 'rank')   return d.rank;
  if (xMode === 'gdp')    return d.gdp;
  if (xMode === 'gdp_pc') return d.gdpPc;
  if (xMode === 'hdi')    return d.hdi;
};
const getY = d => yMode === 'net' ? d.net : yMode === 'exports' ? d.exports : d.imports;

const dotColor = d => {
  if (yMode === 'exports') return '#3b82f6';
  if (yMode === 'imports') return '#ef4444';
  return d.net >= 0 ? '#3b82f6' : '#ef4444';
};

const xLabels = {
  rank:   'Elo Rank  (stronger →)',
  gdp:    'GDP total in billion USD  (log scale, larger →)',
  gdp_pc: 'GDP per capita, PPP  (log scale, richer →)',
  hdi:    'Human Development Index  (more developed →)',
};

const titleMap = {
  rank:   'Elo Rank vs Player Migration · Mundial 2026',
  gdp:    'National Wealth vs Player Migration · Mundial 2026',
  gdp_pc: 'GDP per Capita vs Player Migration · Mundial 2026',
  hdi:    'Human Development vs Player Migration · Mundial 2026',
};
const yLabels = {
  net:     'Players exported − imported',
  exports: 'Players exported',
  imports: 'Players imported',
};

/* ── Chart ─────────────────────────────────────────────────────────── */
const margin = { top:20, right:24, bottom:52, left:48 };
const W = Math.min(window.innerWidth - 80, 880) - margin.left - margin.right;
const H = 440;

const svg = d3.select('#chart')
  .attr('width',  W + margin.left + margin.right)
  .attr('height', H + margin.top  + margin.bottom)
  .style('overflow','visible');

const g = svg.append('g').attr('transform',`translate(${margin.left},${margin.top})`);

let xScale;
const yScale = d3.scaleLinear().range([H, 0]);

const xAxisG = g.append('g').attr('class','axis').attr('transform',`translate(0,${H})`);
const yAxisG = g.append('g').attr('class','axis');

const xAxisLabel = g.append('text').attr('class','axis-label')
  .attr('x',W/2).attr('y',H+44).attr('text-anchor','middle');
const yAxisLabel = g.append('text').attr('class','axis-label')
  .attr('transform','rotate(-90)').attr('x',-H/2).attr('y',-36)
  .attr('text-anchor','middle');

const zeroLine = g.append('line').attr('class','zero-line').attr('x1',0).attr('x2',W);
const gridG    = g.append('g').attr('class','axis grid');
const regrLine = g.append('line').attr('class','regression');

const dotG  = g.append('g');
const dots  = dotG.selectAll('.dot').data(countries, d=>d.name).join('circle')
  .attr('class','dot').attr('r', 5.5).attr('stroke','#fff').attr('stroke-width',1.5);

const labelG = g.append('g');
const labels = labelG.selectAll('.dot-label').data(countries, d=>d.name).join('text')
  .attr('class','dot-label').text(d => d.name);

/* ── Tooltip ───────────────────────────────────────────────────────── */
const tip = document.getElementById('tip');
dots.on('mousemove', (event, d) => {
  const xStr = {
    rank:   `Elo #${d.rank}`,
    gdp:    d.gdp   != null ? `GDP $${d.gdp >= 1000 ? (d.gdp/1000).toFixed(1)+'T' : d.gdp+'B'}` : 'GDP n/a',
    gdp_pc: d.gdpPc != null ? `GDP/cap $${d.gdpPc.toLocaleString()}` : 'GDP/cap n/a',
    hdi:    d.hdi   != null ? `HDI ${d.hdi}` : 'HDI n/a',
  }[xMode];
  tip.style.display = 'block';
  tip.style.left = (event.clientX + 14) + 'px';
  tip.style.top  = (event.clientY - 36) + 'px';
  tip.innerHTML = `<strong>${d.name}</strong>  ${xStr}<br>`
    + `Exports: <strong>${d.exports}</strong> · Imports: <strong>${d.imports}</strong> · Net: <strong>${d.net > 0 ? '+' : ''}${d.net}</strong><br>`
    + `Population: ${d.pop}M`;
}).on('mouseleave', () => { tip.style.display = 'none'; });

/* ── Spearman ──────────────────────────────────────────────────────── */
function spearmanArr(arr, xAcc, yAcc) {
  const n = arr.length;
  if (n < 3) return NaN;
  const rankOf = vals => {
    const sorted = [...vals].sort((a,b)=>a-b);
    return vals.map(v => sorted.indexOf(v) + 1);
  };
  const xs = arr.map(xAcc), ys = arr.map(yAcc);
  const rx = rankOf(xs), ry = rankOf(ys);
  const mx = (n+1)/2, my = (n+1)/2;
  let num=0, dx2=0, dy2=0;
  rx.forEach((r,i) => { num+=(r-mx)*(ry[i]-my); dx2+=(r-mx)**2; dy2+=(ry[i]-my)**2; });
  return num/Math.sqrt(dx2*dy2);
}

/* ── Best-ρ buttons ────────────────────────────────────────────────── */
const MIN_N = 15;
let bestConfig = {};

function computeBestConfigs() {
  const withX = countries.filter(d => getX(d) != null);
  bestConfig = {};
  for (const mode of ['net', 'exports', 'imports']) {
    const yAcc = d => mode === 'net' ? d.net : mode === 'exports' ? d.exports : d.imports;
    let best = { rho: 0, expT: 0, impT: 0, n: 0 };
    for (let et = 0; et <= 10; et++) {
      for (let it = 0; it <= 10; it++) {
        const vis = withX.filter(d => d.exports >= et && d.imports >= it);
        if (vis.length < MIN_N) continue;
        const rho = spearmanArr(vis, getX, yAcc);
        if (!isNaN(rho) && Math.abs(rho) > Math.abs(best.rho)) best = { rho, expT: et, impT: it, n: vis.length };
      }
    }
    bestConfig[mode] = best;
    const sign = best.rho > 0 ? '+' : '';
    const short = { net: 'net', exports: 'exported', imports: 'imported' }[mode];
    document.getElementById(`best-${mode}`).textContent =
      `${short}: ρ = ${sign}${best.rho.toFixed(3)}  (exp≥${best.expT}, imp≥${best.impT}, n=${best.n})`;
  }
}

/* ── Update ────────────────────────────────────────────────────────── */
function update() {
  const expT = +document.getElementById('exp-thresh').value;
  const impT = +document.getElementById('imp-thresh').value;
  document.getElementById('exp-val').textContent = expT;
  document.getElementById('imp-val').textContent = impT;

  const withX   = countries.filter(d => getX(d) != null);
  const visible  = withX.filter(d => d.exports >= expT && d.imports >= impT);

  // X scale
  if (xMode === 'rank') {
    const maxRank = d3.max(withX, d => d.rank) + 5;
    xScale = d3.scaleLinear().domain([maxRank, 1]).range([0, W]);
    xAxisG.call(d3.axisBottom(xScale).ticks(10).tickFormat(d => `#${d}`));
  } else if (xMode === 'hdi') {
    const [minH, maxH] = d3.extent(withX, d => d.hdi);
    xScale = d3.scaleLinear().domain([Math.max(0.3, minH - 0.05), Math.min(1.05, maxH + 0.05)]).range([0, W]);
    xAxisG.call(d3.axisBottom(xScale).ticks(8).tickFormat(d => d.toFixed(2)));
  } else {
    const [minG, maxG] = d3.extent(withX, d => getX(d));
    xScale = d3.scaleLog().domain([minG * 0.7, maxG * 1.4]).range([0, W]);
    xAxisG.call(d3.axisBottom(xScale).ticks(8).tickFormat(d => {
      if (xMode === 'gdp')    return d >= 1000 ? `$${(d/1000).toFixed(0)}T` : `$${d}B`;
      if (xMode === 'gdp_pc') return d >= 1000 ? `$${(d/1000).toFixed(0)}k` : `$${d}`;
    }));
  }
  xAxisLabel.text(xLabels[xMode]);

  // Y scale
  const yVals   = countries.map(d => getY(d));
  const yExtent = d3.extent(yVals);
  const pad     = Math.max(1, (yExtent[1] - yExtent[0]) * 0.05);
  yScale.domain([yExtent[0] - pad, yExtent[1] + pad]);
  yAxisG.call(d3.axisLeft(yScale).ticks(8));
  yAxisLabel.text(yLabels[yMode]);

  // Grid
  gridG.call(d3.axisLeft(yScale).ticks(8).tickSize(-W).tickFormat(''));
  gridG.select('.domain').remove();
  gridG.selectAll('.tick line').style('stroke','#f0ece6').style('stroke-dasharray','2 3');

  // Zero line
  const z = yScale(0);
  zeroLine.attr('y1', z).attr('y2', z)
    .style('opacity', yMode === 'net' && z >= 0 && z <= H ? 1 : 0);

  // Title + subtitle
  document.getElementById('chart-title').textContent = titleMap[xMode];
  const subX = {
    rank:   'X = Elo rank (strongest →)',
    gdp:    'X = GDP total in billion USD (log scale)',
    gdp_pc: 'X = GDP per capita PPP (log scale)',
    hdi:    'X = Human Development Index (Curaçao excluded)',
  };
  const subY = { net: 'Y = exports − imports · blue = net exporter · red = net importer', exports: 'Y = players exported · blue dots', imports: 'Y = players imported · red dots' };
  document.getElementById('sub-x').textContent = subX[xMode];
  document.getElementById('sub-y').textContent = subY[yMode];

  // Dots
  dots
    .classed('dimmed', d => getX(d) == null || d.exports < expT || d.imports < impT)
    .attr('cx', d => getX(d) != null ? xScale(getX(d)) : -999)
    .attr('cy', d => yScale(getY(d)))
    .attr('fill',         d => dotColor(d))
    .attr('fill-opacity', d => dotColor(d) === '#3b82f6' ? 0.75 : 0.65);

  // Labels
  labels
    .attr('x', d => getX(d) != null ? xScale(getX(d)) + 7 : -999)
    .attr('y', d => yScale(getY(d)) + 3)
    .style('display', d => getX(d) != null && d.exports >= expT && d.imports >= impT ? null : 'none');

  // Spearman
  const rho = spearmanArr(visible, getX, getY);
  document.getElementById('corr-label').textContent = isNaN(rho) ? 'ρ = n/a' : `ρ = ${rho.toFixed(3)}`;
  document.getElementById('n-label').textContent = `n = ${visible.length}`;

  // Regression line (OLS in log space for GDP modes)
  if (visible.length >= 2) {
    const useLog = xMode === 'gdp' || xMode === 'gdp_pc';
    const toLinear = d => useLog ? Math.log(getX(d)) : getX(d);
    const xs = visible.map(toLinear), ys = visible.map(getY);
    const mx = d3.mean(xs), my = d3.mean(ys);
    const slope = d3.sum(xs.map((x,i)=>(x-mx)*(ys[i]-my))) / d3.sum(xs.map(x=>(x-mx)**2));
    const b = my - slope * mx;
    const [xr0, xr1] = d3.extent(visible, d => getX(d));
    const xl0 = useLog ? Math.log(xr0) : xr0;
    const xl1 = useLog ? Math.log(xr1) : xr1;
    regrLine
      .attr('x1', xScale(xr0)).attr('y1', yScale(slope * xl0 + b))
      .attr('x2', xScale(xr1)).attr('y2', yScale(slope * xl1 + b))
      .style('display', null);
  } else {
    regrLine.style('display', 'none');
  }

  // Best-btn highlight
  document.querySelectorAll('.best-btn').forEach(b => {
    const cfg = bestConfig[b.dataset.mode];
    b.classList.toggle('active', cfg && b.dataset.mode === yMode && expT === cfg.expT && impT === cfg.impT);
  });
}

/* ── Event listeners ───────────────────────────────────────────────── */
['exp-thresh','imp-thresh'].forEach(id =>
  document.getElementById(id).addEventListener('input', update)
);

document.getElementById('x-toggle').addEventListener('click', e => {
  const btn = e.target.closest('.seg');
  if (!btn) return;
  xMode = btn.dataset.xmode;
  document.querySelectorAll('#x-toggle .seg').forEach(b => b.classList.toggle('active', b === btn));
  computeBestConfigs();
  update();
});

document.getElementById('y-toggle').addEventListener('click', e => {
  const btn = e.target.closest('.seg');
  if (!btn) return;
  yMode = btn.dataset.mode;
  document.querySelectorAll('#y-toggle .seg').forEach(b => b.classList.toggle('active', b === btn));
  update();
});

for (const mode of ['net', 'exports', 'imports']) {
  document.getElementById(`best-${mode}`).addEventListener('click', () => {
    const cfg = bestConfig[mode];
    yMode = mode;
    document.querySelectorAll('#y-toggle .seg').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
    document.querySelectorAll('.best-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
    document.getElementById('exp-thresh').value = cfg.expT;
    document.getElementById('imp-thresh').value = cfg.impT;
    update();
  });
}

computeBestConfigs();
update();
</script>
</body>
</html>
